
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pablo Rodríguez</title>
  <link rel="stylesheet" href="design-system.css">

  <style>
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg-app);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 0;
    }

    .card {
      box-sizing: border-box;
      background: var(--surface-card);
      padding: var(--pad-card);
      border-radius: var(--radius-lg);
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: var(--shadow-card);
    }

    .logo img {
      width: 90px;
      margin-bottom: var(--space-16);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-full);
      object-fit: cover;
      margin: 0 auto var(--space-16);
      display: block;
    }

    h1 {
      margin: 0;
      font: var(--fw-bold) var(--fs-h1)/var(--lh-h1) var(--font-sans);
    }

    .role {
      color: var(--text-secondary);
      margin: var(--space-4) 0 var(--space-24);
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-8);
      background: var(--brand);
      color: var(--text-on-brand);
      padding: var(--space-16);
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-weight: var(--fw-semibold);
      margin-bottom: var(--space-16);
      transition: background 140ms ease;
    }
    .btn-primary:hover { background: var(--brand-hover); }

    .actions {
      display: flex;
      gap: var(--space-8);
      margin-bottom: var(--space-24);
    }

    .btn-secondary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-8);
      padding: var(--space-12);
      border-radius: var(--radius-pill);
      text-decoration: none;
      background: var(--white);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-size: var(--fs-sm);
      text-align: center;
      transition: background 140ms ease;
    }
    .btn-secondary:hover { background: var(--surface-hover); }

    .footer {
      margin-top: var(--space-16);
      font-weight: var(--fw-semibold);
      color: var(--brand);
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="logo">
      <img src="logo.png" />
    </div>

    <img class="avatar"
         src="photos/pablo-rodriguez.jpg"
         onerror="this.src='https://via.placeholder.com/100'" />

    <h1>Pablo Rodríguez</h1>
    <div class="role">Desarrollo de Negocio</div>

    <a id="saveBtn"
       class="btn-primary"
       href="vcf/pablo-rodriguez.vcf">
      Guardar contacto
    </a>

    <div class="actions">
      <a class="btn-secondary" href="tel:+34651965417">
        <span class="material-symbols-outlined">call</span> Llamar
      </a>
      <a class="btn-secondary" href="mailto:pablo.rodriguez@imatia.com">
        <span class="material-symbols-outlined">mail</span> Email
      </a>
      <a class="btn-secondary" href="https://www.linkedin.com/in/pablo-rodr%C3%ADguez-pappalardo-5b0b9116/" target="_blank">
      <span class="material-symbols-outlined">work</span> LinkedIn
      </a>
    </div>

    <div class="footer">
      www.imatia.com
    </div>

  </div>

  <script>
    const btn = document.getElementById("saveBtn");
    const ua = navigator.userAgent.toLowerCase();

    if (ua.includes("iphone") || ua.includes("ipad")) {
      btn.innerText = "Guardar en iPhone";
    } else if (ua.includes("android")) {
      btn.innerText = "Guardar en Android";
    }
  </script>

</body>
</html>
