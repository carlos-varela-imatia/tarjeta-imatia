<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Guardar contacto – Imatia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f7f7;
      color: #111;
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .header {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      object-fit: contain;
    }

    .name {
      font-size: 1.35rem;
      font-weight: 600;
    }

    .role {
      font-size: 1rem;
      color: #666;
      margin-top: 2px;
    }

    .cta {
      margin-top: 28px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      background: #ff4d3b;
      color: #fff;
      padding: 14px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: 0.2s;
    }

    .btn:hover {
      background: #ff2e1c;
    }

    .help {
      margin-top: 14px;
      color: #666;
      font-size: 0.9rem;
      line-height: 1.4rem;
    }

    .brand {
      margin-top: 32px;
      text-align: center;
      font-size: 0.95rem;
      color: #888;
    }

    .brand a {
      color: #ff4d3b;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="header">
      <img src="./logo.png" class="logo" alt="Logo Imatia">
      <div>
        <div class="name">José María Ozores</div>
        <div class="role">Desarrollo de Negocio</div>
      </div>
    </div>

    <div class="cta">
      <a id="addBtn" class="btn" href="./jose_maria_ozores.vcf">
        Guardar contacto
      </a>

      <div class="help" id="helpText">
        El contacto se descargará automáticamente. Si no se abre, pulsa sobre el archivo descargado.
      </div>
    </div>

    <div class="brand">
      <a href="https://www.imatia.com" target="_blank">www.imatia.com</a>
    </div>

  </div>

<script>
(function() {
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isIOS = /iPhone|iPad|iPod/.test(ua);
    var isAndroid = /Android/i.test(ua);

    var help = document.getElementById("helpText");

    if (isIOS) {
      help.innerHTML = 
        "En iPhone se abrirá en Contactos. Si te pregunta, selecciona “Crear nuevo contacto”.";
    } 
    else if (isAndroid) {
      help.innerHTML =
        "En Android puede descargarse primero. Toca el archivo .vcf descargado y añádelo a Contactos.";
    }
})();
</script>

</body>
</html>
