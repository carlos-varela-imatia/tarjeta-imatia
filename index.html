const html = `
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${emp.name}</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 32px 24px;
      border-radius: 20px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .logo img {
      width: 90px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .role {
      color: #666;
      margin: 6px 0 20px;
    }

    .btn-primary {
      display: block;
      background: #ff4a3d;
      color: white;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-secondary {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      background: #f0f0f0;
      color: #333;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      font-weight: 500;
      color: #ff4a3d;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="logo">
      <img src="https://www.imatia.com/wp-content/uploads/2020/06/logo-imatia.png" />
    </div>

    <img class="avatar" src="../photos/${emp.photo}" />

    <h1>${emp.name}</h1>
    <div class="role">${emp.role}</div>

    <a id="saveBtn" class="btn-primary" href="../vcf/${emp.id}.vcf">
      Guardar contacto
    </a>

    <div class="actions">
      <a class="btn-secondary" href="tel:${emp.phone}">📞 Llamar</a>
      <a class="btn-secondary" href="mailto:${emp.email}">✉️ Email</a>
    </div>

    <div class="footer">
      www.imatia.com
    </div>

  </div>

  <script>
    const btn = document.getElementById("saveBtn");
    const ua = navigator.userAgent.toLowerCase();

    if (ua.includes("iphone") || ua.includes("ipad")) {
      btn.innerText = "Guardar en iPhone";
    } else if (ua.includes("android")) {
      btn.innerText = "Guardar en Android";
    }
  </script>

</body>
</html>
`;
